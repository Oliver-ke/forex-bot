name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: pnpm install --frozen-lockfile
      - run: pnpm proto:gen
      - run: pnpm -r typecheck
      - run: pnpm lint
      - name: Verify no real Anthropic calls in tests
        run: |
          if grep -RInE 'new\s+AnthropicLlm\b' --include='*.test.ts' .; then
            echo "ERROR: AnthropicLlm cannot be instantiated in tests — use FakeLlm." >&2
            exit 1
          fi
      # PR-level event-study verification is covered by the CLI integration
      # test in `apps/eval-event-study/test/cli.test.ts`, which `pnpm test`
      # picks up via vitest's `apps/*/test/**` include glob. We deliberately
      # do NOT add a separate `event-study-cheap` job here: the built-in
      # CHEAP_FAKE_LLM=1 fake route is always-long, but two of the three
      # canonical fixtures (NFP, SNB) expect short — so a CLI run with the
      # built-in fake would always fail PRs. The cron jobs in
      # `eval-nightly.yml` and `eval-weekly.yml` cover wider replays.
      - run: pnpm test -- --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: astral-sh/setup-uv@v3
        with: { version: "0.4.30" }
      - run: |
          cd mt5-sidecar
          uv venv
          uv pip install -e ".[dev]"
          make proto
          uv run pytest -v
